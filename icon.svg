<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#20b15c"/>
    </linearGradient>
  </defs>

  <!-- Drum body -->
  <rect x="28" y="24" width="136" height="132" rx="38" fill="url(#g)"/>

  <!-- Dome top -->
  <path d="M28 42 Q28 10 96 10 Q164 10 164 42" fill="#20b15c"/>

  <!-- Glass window -->
  <circle cx="96" cy="90" r="44" fill="#eafff0"/>

  <!-- Window shine -->
  <ellipse cx="78" cy="70" rx="22" ry="14" fill="#fff" opacity="0.4"/>

  <!-- Balls inside drum -->
  <circle cx="80" cy="80" r="11" fill="#e74c3c"/>
  <circle cx="112" cy="76" r="11" fill="#3498db"/>
  <circle cx="96" cy="106" r="11" fill="#f1c40f"/>
  <circle cx="74" cy="104" r="11" fill="#9b59b6"/>
  <circle cx="114" cy="102" r="11" fill="#1abc9c"/>

  <!-- Ball highlights -->
  <circle cx="77" cy="77" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="109" cy="73" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="93" cy="103" r="3" fill="#fff" opacity="0.5"/>

  <!-- Crank arm -->
  <rect x="164" y="80" width="14" height="8" rx="4" fill="#2c3e50"/>
  <rect x="164" y="72" width="6" height="24" rx="3" fill="#2c3e50"/>

  <!-- Crank handle -->
  <circle cx="182" cy="84" r="10" fill="#34495e"/>

  <!-- Chute / exit tube -->
  <path d="M64 156 L56 168 L136 168 L128 156" fill="#20b15c"/>

  <!-- Ball coming out -->
  <circle cx="96" cy="166" r="14" fill="#e74c3c"/>
  <circle cx="93" cy="163" r="4" fill="#fff" opacity="0.4"/>
</svg>
