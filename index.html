<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Bingo</title>
  <meta name="theme-color" content="#2ecc71">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ========== LOGIN VIEW ========== -->
<div id="viewLogin" class="view-login">
  <div class="login-container">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo-btn">
          <svg class="login-icon" viewBox="0 0 100 100" fill="white">
            <rect x="22" y="32" width="56" height="46" rx="10"/>
            <path d="M22 38 Q22 14 50 14 Q78 14 78 38"/>
            <circle cx="50" cy="55" r="16" fill="rgba(255,255,255,0.3)"/>
            <circle cx="43" cy="50" r="5" fill="white"/>
            <circle cx="57" cy="48" r="5" fill="white"/>
            <circle cx="50" cy="62" r="5" fill="white"/>
            <rect x="78" y="50" width="8" height="4" rx="2"/>
            <circle cx="89" cy="52" r="4"/>
            <circle cx="50" cy="85" r="7" fill="white"/>
          </svg>
        </div>
        <h1 class="login-title">BINGO</h1>
      </div>
      <button class="btn-google" id="btnGoogleLogin">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Iniciar sesi&oacute;n
      </button>
    </div>
  </div>
</div>

<!-- ========== MAIN APP ========== -->
<div id="viewApp" class="view-app hidden">
  <div id="app">
    <header>
      <div class="header-inner">
        <div class="header-left">
          <button class="btn-back" id="btnBack" aria-label="Volver">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <div class="header-brand">
            <button class="header-logo-btn" id="btnLogo" aria-label="Bingo">
              <svg width="24" height="24" viewBox="0 0 100 100" fill="white">
                <rect x="22" y="32" width="56" height="46" rx="10"/>
                <path d="M22 38 Q22 14 50 14 Q78 14 78 38"/>
                <circle cx="50" cy="55" r="16" fill="rgba(255,255,255,0.3)"/>
                <circle cx="43" cy="50" r="5" fill="white"/>
                <circle cx="57" cy="48" r="5" fill="white"/>
                <circle cx="50" cy="62" r="5" fill="white"/>
                <rect x="78" y="50" width="8" height="4" rx="2"/>
                <circle cx="89" cy="52" r="4"/>
                <circle cx="50" cy="85" r="7" fill="white"/>
              </svg>
            </button>
            <h1 id="headerTitle">BINGO</h1>
          </div>
        </div>
      </div>
    </header>

    <div class="main-content" id="main-content">

      <!-- ===== BINGO GAME ===== -->
      <div class="bingo-game">
        <div class="status-bar">
          <span id="bolasRestantes">90 restantes</span>
          <span id="estado" class="estado pausado">Pausado</span>
        </div>

        <div class="numero-actual" id="numeroActual">--</div>

        <div class="botones">
          <button id="btnIniciar" class="btn btn-verde">Iniciar</button>
          <button id="btnPausar" class="btn btn-naranja" disabled>Pausar</button>
          <button id="btnReiniciar" class="btn btn-rojo">Reiniciar</button>
          <button id="btnMute" class="btn btn-mute" title="Activar/desactivar voz">🔊</button>
        </div>

        <div class="historial">
          <h2>Historial</h2>
          <div id="historialLista"></div>
        </div>
      </div>

      <!-- ===== USERS VIEW ===== -->
      <div class="view" id="viewUsuarios">
        <div class="players-list" id="usuariosList"></div>
      </div>

    </div>

    <div id="toast"></div>
  </div>
</div>

<!-- ========== USER MODAL ========== -->
<div class="modal" id="modalUsuario">
  <div class="modal-overlay" id="modalUsuarioOverlay"></div>
  <div class="modal-panel">
    <div class="modal-header">
      <h2 id="usuarioModalTitle">Nuevo usuario</h2>
      <div class="modal-header-actions">
        <button class="modal-header-btn modal-header-btn-save" aria-label="Guardar usuario" type="submit" form="usuarioForm">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
        </button>
        <button class="modal-close" id="modalUsuarioClose" aria-label="Cerrar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
    <form id="usuarioForm" autocomplete="off">
      <input type="hidden" id="editUsuarioEmail">
      <div class="form-group">
        <label for="inviteEmail">Email</label>
        <input type="email" id="inviteEmail" placeholder="Email del usuario" required autofocus>
      </div>
    </form>
  </div>
</div>

<!-- ========== CONFIRM MODAL ========== -->
<div class="modal modal-confirm" id="modalConfirm">
  <div class="modal-overlay" id="modalConfirmOverlay"></div>
  <div class="modal-panel confirm-panel">
    <div class="confirm-icon" id="confirmIcon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
    </div>
    <div class="confirm-text" id="confirmText">&iquest;Est&aacute;s seguro?</div>
    <div class="confirm-actions">
      <button class="btn-confirm-cancel" id="btnConfirmCancel">Cancelar</button>
      <button class="btn-confirm-ok" id="btnConfirmOk">Eliminar</button>
    </div>
  </div>
</div>

<!-- ========== FAB ========== -->
<button class="fab" id="fabAdd" aria-label="Acci&oacute;n">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round">
    <line x1="12" y1="5" x2="12" y2="19"/>
    <line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
</button>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="script.js"></script>
</body>
</html>
